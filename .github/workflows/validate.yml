name: Validate Lucky Block
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check marker file
        run: test -f .luckyblock.yml

      - name: Check block_config.yml
        run: test -f block_config.yml

      - name: Validate YAML syntax
        run: |
          pip install pyyaml
          python -c "import yaml; yaml.safe_load(open('block_config.yml'))"
          python -c "import yaml; yaml.safe_load(open('weights.yml'))"
          python -c "import yaml; yaml.safe_load(open('.luckyblock.yml'))"

      - name: Validate drop JSON files
        run: |
          find drops -name "*.json" -exec python -c "
          import json, sys
          with open(sys.argv[1]) as f:
              data = json.load(f)
              assert 'id' in data, f'Missing id in {sys.argv[1]}'
              assert 'events' in data, f'Missing events in {sys.argv[1]}'
          " {} \;

      - name: Validate item JSON files
        run: |
          find items -name "item.json" -exec python -c "
          import json, sys
          with open(sys.argv[1]) as f:
              data = json.load(f)
              assert 'id' in data, f'Missing id in {sys.argv[1]}'
              assert 'material' in data, f'Missing material in {sys.argv[1]}'
          " {} \;

      - name: Check required directories
        run: |
          test -d drops
          test -d items
          test -d blocks
